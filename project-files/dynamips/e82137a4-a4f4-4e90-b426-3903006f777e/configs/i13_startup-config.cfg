!

!
version 12.4
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname STUD2
!
boot-start-marker
boot-end-marker
!
!
no aaa new-model
memory-size iomem 5
no ip icmp rate-limit unreachable
ip cef
!
!
!
!
no ip domain lookup
ip auth-proxy max-nodata-conns 3
ip admission max-nodata-conns 3
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
ip tcp synwait-time 5
! 
!
!
!
!
interface Tunnel0
 ip address 10.10.10.2 255.255.255.248
 ip tcp adjust-mss 1360
 tunnel source 200.1.111.233
 tunnel destination 200.1.111.233
!
interface FastEthernet0/0
 ip address 172.16.40.1 255.255.255.224
 ip helper-address 196.4.160.12
 duplex auto
 speed auto
!
interface Serial0/0
 ip address 100.73.49.2 255.255.255.252
 clock rate 2000000
!
interface FastEthernet0/1
 no ip address
 shutdown
 duplex auto
 speed auto
!
interface Serial0/1
 no ip address
 shutdown
 clock rate 2000000
!
interface Serial0/2
 no ip address
 shutdown
 clock rate 2000000
!
interface Serial0/3
 no ip address
 shutdown
 clock rate 2000000
!
interface Serial0/4
 no ip address
 shutdown
 clock rate 2000000
!
interface Serial0/5
 no ip address
 shutdown
 clock rate 2000000
!
interface FastEthernet1/0
 no ip address
 shutdown
 duplex auto
 speed auto
!
interface FastEthernet2/0
 no ip address
 shutdown
 duplex auto
 speed auto
!
interface FastEthernet3/0
 no ip address
 shutdown
 duplex auto
 speed auto
!
interface FastEthernet4/0
 no ip address
 shutdown
 duplex auto
 speed auto
!
router bgp 65000
 no synchronization
 bgp router-id 192.168.101.1
 bgp log-neighbor-changes
 network 192.168.101.0
 neighbor 100.73.49.1 remote-as 65001
 no auto-summary
!
ip forward-protocol nd
ip route 192.168.1.0 255.255.255.0 100.73.40.5
ip route 196.4.160.0 255.255.255.0 FastEthernet0/0 192.168.1.1
ip route 200.1.111.233 255.255.255.255 100.73.40.1
ip route 200.1.111.233 255.255.255.255 Serial0/0 100.73.40.1
!
!
no ip http server
no ip http secure-server
!
no cdp log mismatch duplex
!
!
!
control-plane
!
!
!
!
!
!
!
!
!
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
line vty 0 4
 login
!
ntp server 196.4.160.12
!
end
