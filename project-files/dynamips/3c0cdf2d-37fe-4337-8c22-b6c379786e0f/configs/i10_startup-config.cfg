!

!
version 12.4
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname CF-R
!
boot-start-marker
boot-end-marker
!
!
no aaa new-model
memory-size iomem 5
no ip icmp rate-limit unreachable
ip cef
!
!
!
!
no ip domain lookup
ip auth-proxy max-nodata-conns 3
ip admission max-nodata-conns 3
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
ip tcp synwait-time 5
! 
!
!
!
!
interface FastEthernet0/0
 ip address 172.16.20.1 255.255.255.224
 ip helper-address 196.4.160.12
 duplex auto
 speed auto
!
interface Serial0/0
 description CF-R to FR2 link
 no ip address
 encapsulation frame-relay
 no fair-queue
 clock rate 2000000
 frame-relay traffic-shaping
!
interface Serial0/0.110 point-to-point
 description Link to STUD1
 ip address 10.0.0.2 255.255.255.252
 frame-relay interface-dlci 110   
  class CIR_CF_SA
!
interface Serial0/0.205 point-to-point
 description Link to SA-R
 ip address 10.0.0.5 255.255.255.252
 frame-relay interface-dlci 205   
  class CIR_CF_SA
!
interface FastEthernet0/1
 no ip address
 shutdown
 duplex auto
 speed auto
!
interface Serial0/1
 no ip address
 shutdown
 clock rate 2000000
!
interface Serial0/2
 no ip address
 shutdown
 clock rate 2000000
!
interface Serial0/3
 no ip address
 shutdown
 clock rate 2000000
!
interface Serial0/4
 no ip address
 shutdown
 clock rate 2000000
!
interface Serial0/5
 no ip address
 shutdown
 clock rate 2000000
!
interface FastEthernet1/0
 no ip address
 shutdown
 duplex auto
 speed auto
!
interface FastEthernet2/0
 no ip address
 shutdown
 duplex auto
 speed auto
!
interface FastEthernet3/0
 no ip address
 shutdown
 duplex auto
 speed auto
!
interface FastEthernet4/0
 no ip address
 shutdown
 duplex auto
 speed auto
!
router bgp 222
 no synchronization
 bgp log-neighbor-changes
 network 172.16.20.0 mask 255.255.255.224
 neighbor 10.0.0.1 remote-as 111
 neighbor 10.0.0.6 remote-as 333
 no auto-summary
!
ip forward-protocol nd
!
!
no ip http server
no ip http secure-server
!
!
map-class frame-relay CIR_CF_SA
 frame-relay cir 64000
!
map-class frame-relay CIR_SA
no cdp log mismatch duplex
!
!
!
control-plane
!
!
!
!
!
!
!
!
!
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
line vty 0 4
 login
!
ntp server 196.4.160.12
!
end
