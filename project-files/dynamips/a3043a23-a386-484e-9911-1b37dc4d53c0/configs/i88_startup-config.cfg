router bgp 20
 no synchronization
 bgp log-neighbor-changes
 network 168.209.100.48 mask 255.255.255.240
 network 168.209.120.0 mask 255.255.255.0
 neighbor 168.209.100.56 remote-as 19
 neighbor 168.209.120.2 remote-as 140
 neighbor 168.209.120.12 remote-as 65017
 neighbor 168.209.120.13 remote-as 311
 neighbor 168.209.120.67 remote-as 133
 no auto-summary
!
ip forward-protocol nd
!
!
no ip http server
no ip http secure-server
!
no cdp log mismatch duplex
!
!
!
control-plane
!
!
!
!
!
!
!
!
!
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
line aux 0
