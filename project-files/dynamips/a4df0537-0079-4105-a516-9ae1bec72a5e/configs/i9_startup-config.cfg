!
!
!

!
version 12.4
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname SA-R
!
boot-start-marker
boot-end-marker
!
!
no aaa new-model
memory-size iomem 5
no ip icmp rate-limit unreachable
ip cef
!
!
!
!
no ip domain lookup
ip auth-proxy max-nodata-conns 3
ip admission max-nodata-conns 3
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
ip tcp synwait-time 5
! 
!
!
!
!
interface FastEthernet0/0
 ip address 172.16.10.1 255.255.255.224
 ip helper-address 196.4.160.12
 duplex auto
 speed auto
!
interface Serial0/0
 description SA-R to FR3 link
 no ip address
 encapsulation frame-relay
 no fair-queue
 clock rate 2000000
 frame-relay traffic-shaping
!
interface Serial0/0.210 point-to-point
 description Link to CF-R
 ip address 10.0.0.6 255.255.255.252
 frame-relay interface-dlci 210   
  class CIR_SA_CF
!
interface Serial0/0.305 point-to-point
 description Link to FRX1
 ip address 10.0.0.9 255.255.255.252
 frame-relay interface-dlci 305   
  class CIR_SA_STUD1
!
interface FastEthernet0/1
 no ip address
 shutdown
 duplex auto
 speed auto
!
interface Serial0/1
 no ip address
 shutdown
 clock rate 2000000
!
interface Serial0/2
 no ip address
 shutdown
 clock rate 2000000
!
interface Serial0/3
 no ip address
 shutdown
 clock rate 2000000
!
interface Serial0/4
 no ip address
 shutdown
 clock rate 2000000
!
interface Serial0/5
 no ip address
 shutdown
 clock rate 2000000
!
interface FastEthernet1/0
 no ip address
 shutdown
 duplex auto
 speed auto
!
interface FastEthernet2/0
 no ip address
 shutdown
 duplex auto
 speed auto
!
interface FastEthernet3/0
 no ip address
 shutdown
 duplex auto
 speed auto
!
interface FastEthernet4/0
 no ip address
 shutdown
 duplex auto
 speed auto
!
router bgp 333
 no synchronization
 bgp log-neighbor-changes
 network 172.16.10.0 mask 255.255.255.224
 neighbor 10.0.0.5 remote-as 222
 neighbor 10.0.0.10 remote-as 444
 no auto-summary
!
ip forward-protocol nd
!
!
no ip http server
no ip http secure-server
!
!
map-class frame-relay CIR_SA_CF
 frame-relay cir 64000
!
map-class frame-relay CIR_SA_STUD1
 frame-relay cir 256000
no cdp log mismatch duplex
!
!
!
control-plane
!
!
!
!
!
!
!
!
!
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
line vty 0 4
 login
!
ntp server 196.4.160.12
!
end
